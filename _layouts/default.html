<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Harish Kumar — International School Mathematics Teacher portfolio. IB Diploma Programme, high school, and middle school mathematics, with leadership systems work.">

    {% seo %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
  </head>
  <body>
    <header class="page-header" role="banner">
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Home</a>
        <a href="{{ '/about.html' | relative_url }}" class="{% if page.url == '/about.html' %}active{% endif %}">About</a>
        <a href="{{ '/philosophy.html' | relative_url }}" class="{% if page.url == '/philosophy.html' %}active{% endif %}">Philosophy</a>
        <a href="{{ '/resume.html' | relative_url }}" class="{% if page.url == '/resume.html' %}active{% endif %}">Resume</a>
        <a href="{{ '/resources.html' | relative_url }}" class="{% if page.url == '/resources.html' %}active{% endif %}">Resources</a>
        <a href="{{ '/ia-compass/' | relative_url }}" target="_blank" rel="noopener">IA Compass</a>
        <a href="{{ '/leadership-compass/' | relative_url }}" target="_blank" rel="noopener">Leadership Compass</a>
        <a href="{{ '/contact.html' | relative_url }}" class="{% if page.url == '/contact.html' %}active{% endif %}">Contact</a>
      </nav>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}
    </main>

    <footer class="site-footer-custom" role="contentinfo">
      <div class="footer-name">Harish Kumar</div>
      <div>International School Mathematics Teacher &middot; Hong Kong</div>
      <div style="margin-top: 0.6rem;">
        <a href="{{ '/contact.html' | relative_url }}">Contact</a>
        &middot;
        <a href="https://linkedin.com/in/harishjhaldiyal" target="_blank" rel="noopener">LinkedIn</a>
        &middot;
        <a href="{{ '/ia-compass/' | relative_url }}" target="_blank" rel="noopener">IA Compass</a>
        &middot;
        <a href="{{ '/leadership-compass/' | relative_url }}" target="_blank" rel="noopener">Leadership Compass</a>
      </div>
    </footer>
  </body>
</html>
